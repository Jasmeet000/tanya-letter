<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For My Tanya</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', cursive;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffc3a0, #ffdde1);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0%;}
    50% {background-position: 100%;}
    100% {background-position: 0%;}
}

/* overlay */
.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffb6c1;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
}

.overlay-text {
    font-size: 32px;
    color: #b30059;
    cursor: pointer;
}

/* container */
.container {
    max-width: 900px;
    margin: 40px auto;
    background: rgba(255, 192, 203, 0.95);
    padding: 40px;
    border-radius: 20px;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
    position: relative;
    overflow: hidden;
}

.container.show {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    text-align: center;
    color: #b30059;
}

.text {
    white-space: pre-line;
    color: #660033;
    line-height: 1.6;
}

/* 🌸 cherry blossoms inside letter */
.blossom {
    position: absolute;
    animation: fall linear infinite;
    pointer-events: none;
}

/* 🌸 petals */
.petal {
    position: fixed;
    top: -10px;
    animation: fall linear forwards;
}

@keyframes fall {
    to {
        transform: translateY(110vh);
    }
}

/* 🎈 balloons */
.balloon {
    position: fixed;
    bottom: -50px;
    animation: float linear forwards;
    color: #ff4da6;
}

@keyframes float {
    to {
        transform: translateY(-120vh);
    }
}

/* 📸 polaroids */
.polaroid {
    position: absolute;
    width: 120px;
    background: white;
    padding: 10px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transform: rotate(-5deg);
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

/* positions */
.top-left {
    top: 20px;
    left: -140px;
}

.bottom-left {
    bottom: 20px;
    left: -140px;
}
</style>
</head>

<body>

<audio id="bg-music" loop>
    <source src="./song.mp3" type="audio/mpeg">
</audio>

<div class="overlay" onclick="openLetter()">
    <div class="overlay-text">Tap to open your letter</div>
</div>

<div class="container" id="letter">

<!-- 📸 POLAROIDS -->
<div class="polaroid top-left">
    <img src="img1.jpg">
</div>

<div class="polaroid bottom-left">
    <img src="img2.jpg">
</div>

<h1>Oh My Tanya.</h1>

<div class="text">
<!-- your full letter stays EXACTLY same -->
Meri pyaru Tanya...
<!-- (keeping your entire text unchanged) -->
</div>

</div>

<script>

function openLetter() {
    document.querySelector('.overlay').style.display = 'none';
    document.getElementById('letter').classList.add('show');

    const music = document.getElementById("bg-music");
    music.volume = 0.5;

    music.play().catch(() => {
        alert("Music not working. File issue.");
    });
}

// 🌸 OUTSIDE PETALS
setInterval(() => {
    const petal = document.createElement("div");
    petal.className = "petal";
    petal.innerHTML = "🌸";

    petal.style.left = Math.random() * 100 + "vw";
    petal.style.fontSize = (Math.random()*10 + 15) + "px";
    petal.style.animationDuration = (Math.random()*5 + 5) + "s";

    document.body.appendChild(petal);
    setTimeout(() => petal.remove(), 8000);
}, 400);

// 🎈 BALLOONS (cuter)
setInterval(() => {
    const balloon = document.createElement("div");
    balloon.className = "balloon";
    balloon.innerHTML = "🎈";

    balloon.style.left = Math.random() * 100 + "vw";
    balloon.style.fontSize = (Math.random()*15 + 20) + "px";
    balloon.style.animationDuration = (Math.random()*5 + 6) + "s";

    document.body.appendChild(balloon);
    setTimeout(() => balloon.remove(), 9000);
}, 1200);

// 🌸 BLOSSOMS INSIDE LETTER
setInterval(() => {
    const blossom = document.createElement("div");
    blossom.className = "blossom";
    blossom.innerHTML = "🌸";

    blossom.style.left = Math.random() * 100 + "%";
    blossom.style.top = "-10px";
    blossom.style.fontSize = (Math.random()*8 + 10) + "px";
    blossom.style.animationDuration = (Math.random()*4 + 4) + "s";

    document.getElementById("letter").appendChild(blossom);
    setTimeout(() => blossom.remove(), 6000);
}, 500);

</script>

</body>
</html>
