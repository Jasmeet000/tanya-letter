<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Tanya ❤️</title>

<style>
body {
    margin: 0;
    font-family: 'Georgia', cursive;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #ffc3a0, #ffdde1);
    background-size: 400% 400%;
    animation: gradient 10s ease infinite;
}

@keyframes gradient {
    0% {background-position: 0%;}
    50% {background-position: 100%;}
    100% {background-position: 0%;}
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ffb6c1;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    cursor: pointer;
    z-index: 10;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    background: #ffc0cb;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    position: relative;
    opacity: 0;
    transform: translateY(30px);
    transition: 1s;
}

.container.show {
    opacity: 1;
    transform: translateY(0);
}

h1 {
    text-align: center;
    color: #b30059;
}

.text {
    white-space: pre-line;
    color: #660033;
    line-height: 1.6;
}

.polaroid {
    position: absolute;
    width: 150px;
    background: white;
    padding: 8px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.polaroid img {
    width: 100%;
    border-radius: 5px;
}

/* placement */
.img1 { top: 20px; right: -80px; transform: rotate(5deg); }
.img2 { top: 250px; right: -90px; transform: rotate(-5deg); }
.img3 { bottom: 250px; right: -80px; transform: rotate(6deg); }
.img4 { bottom: 20px; right: -100px; transform: rotate(-6deg); }

/* floating hearts */
.heart {
    position: fixed;
    color: pink;
    animation: float 6s infinite;
}

@keyframes float {
    from { transform: translateY(100vh); opacity: 1; }
    to { transform: translateY(-10vh); opacity: 0; }
}
</style>
</head>

<body>

<div class="overlay" onclick="openLetter()">
    Tap to open your letter ❤️
</div>

<div class="container" id="letter">

<h1>Oh thy Tanya.</h1>

<div class="text">
(PASTE YOUR FULL LETTER HERE EXACTLY)
</div>

<div class="polaroid img1"><img src="img1.jpg"></div>
<div class="polaroid img2"><img src="img2.jpg"></div>
<div class="polaroid img3"><img src="img3.jpg"></div>
<div class="polaroid img4"><img src="img4.jpg"></div>

</div>

<script>
function openLetter() {
    document.querySelector('.overlay').style.display = 'none';
    document.getElementById('letter').classList.add('show');
}

// floating hearts
setInterval(() => {
    const heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (Math.random()*20 + 10) + "px";
    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 6000);
}, 500);
</script>

</body>
</html>
